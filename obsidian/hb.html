<!DOCTYPE html>

    <style type="text/css">
#hb-root {
	position: relative;
    height: 240px;
}

#hb-root::before {
	content: " ";
	position: absolute;
	inset: 0 auto auto 0;
	width: 100%;
	height: 230px;
	background: url("https://rabbitwave98.github.io/neo98/assets/banners/moon.png") top / cover no-repeat;
	pointer-events: none;
	z-index: -1;
	-webkit-mask-image: linear-gradient(
		to bottom,
		black 0%,
		black 70%,
		transparent 100%);
	mask-image: linear-gradient(
		to bottom,
		black 0%,
		black 70%,
		transparent 100%);
}   
    </style>
    <div id="hb-root">  </div>
